<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Drucken</title>
<style>
:root{
    --primary:#0f172a;
    --accent:#3b82f6;
    --bg:#f8fafc;
    --card:#ffffff;
    --border:#e2e8f0;
    --text:#1e293b;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", system-ui, sans-serif;
    -webkit-tap-highlight-color: transparent;
}
html,body{
    overflow-x:hidden;
    background:var(--bg);
}
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:20px 12px;
}
.container{
    width:100%;
    max-width:520px;
    background:var(--card);
    border-radius:18px;
    padding:22px;
    box-shadow:0 10px 40px rgba(0,0,0,.06);
}
h1{
    text-align:center;
    color:var(--primary);
    font-size:20px;
    font-weight:800;
    margin-bottom:18px;
    letter-spacing:-0.5px;
}
.toolbar{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:8px;
    margin-bottom:12px;
}
.font-row{
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    gap:6px;
    margin-bottom:10px;
}
.font-row-2{
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    gap:6px;
    margin-bottom:14px;
}
button{
    padding:8px 4px;
    border-radius:8px;
    font-size:12px;
    border:1px solid var(--border);
    background:white;
    color:#475569;
    cursor:pointer;
    transition:all .2s;
    font-weight:600;
    text-align:center;
    touch-action:manipulation;
    white-space:nowrap;
}
button:hover{
    border-color:var(--accent);
    color:var(--accent);
}
button.active{
    background:var(--primary);
    color:white;
    border-color:var(--primary);
}
textarea{
    width:100%;
    height:320px;
    border:2px solid var(--border);
    border-radius:14px;
    padding:16px;
    font-size:16px;
    resize:vertical;
    outline:none;
    line-height:1.7;
    direction:ltr;
    background:#fafbfc;
    color:var(--text);
    transition:border-color .3s;
}
textarea:focus{
    border-color:var(--accent);
    background:white;
}
.meta{
    text-align:right;
    font-size:12px;
    color:#94a3b8;
    margin-top:6px;
    padding:0 4px;
}
.actions{
    display:grid;
    grid-template-columns: 2fr 1fr;
    gap:10px;
    margin-top:18px;
}
.btn{
    padding:14px;
    border-radius:12px;
    font-size:15px;
    font-weight:700;
    transition:all .3s;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    border:none;
    cursor:pointer;
}
.print-btn{
    background:var(--primary);
    color:white;
    box-shadow:0 4px 14px rgba(15,23,42,.2);
}
.print-btn:hover{
    background:#1e293b;
    transform:translateY(-1px);
}
.reset-btn{
    background:#f1f5f9;
    color:#475569;
}
.reset-btn:hover{
    background:#e2e8f0;
}
@media (max-width: 480px){
    .font-row{grid-template-columns: repeat(4, 1fr);}
    .font-row-2{grid-template-columns: repeat(3, 1fr);}
}
@media (max-width: 400px){
    body{padding:12px 8px;}
    .container{padding:16px 12px;border-radius:14px;}
    h1{font-size:18px;margin-bottom:14px;}
    textarea{height:240px;font-size:16px;}
    .actions{grid-template-columns:1fr;}
    .toolbar{grid-template-columns:repeat(3,1fr);}
}
@page{
    size:105mm 148mm portrait;
    margin:0;
}
@media print{
    *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
    html,body{margin:0;padding:0;background:white;width:105mm;height:148mm;overflow:hidden;}
    .container{box-shadow:none;border:none;padding:0;margin:0;width:105mm;height:148mm;max-width:none;background:white;border-radius:0;}
    h1,.toolbar,.font-row,.font-row-2,.actions,.meta{display:none!important;}
    .textarea-wrapper{margin:0;padding:0;width:105mm;height:148mm;}
    textarea{width:105mm;height:148mm;border:none;outline:none;resize:none;padding:8mm;margin:0;background:transparent;overflow:hidden;font-size:12pt;line-height:1.5;text-align:left;direction:ltr;border-radius:0;box-shadow:none;}
}
</style>
</head>
<body>

<div class="container">
    <h1>🖨️ Direktdruck</h1>
    
    <div class="toolbar">
        <button onclick="setAlign('left')" class="active" id="btn-left">Links</button>
        <button onclick="setAlign('center')" id="btn-center">Zentriert</button>
        <button onclick="setAlign('right')" id="btn-right">Rechts</button>
    </div>
    
    <div class="font-row">
        <button onclick="setFontSize('8pt')" id="btn-s8">8</button>
        <button onclick="setFontSize('9pt')" id="btn-s9">9</button>
        <button onclick="setFontSize('10pt')" id="btn-s10">10</button>
        <button onclick="setFontSize('11pt')" id="btn-s11">11</button>
        <button onclick="setFontSize('12pt')" id="btn-s12" class="active">12</button>
        <button onclick="setFontSize('13pt')" id="btn-s13">13</button>
        <button onclick="setFontSize('14pt')" id="btn-s14">14</button>
    </div>
    
    <div class="font-row-2">
        <button onclick="setFontSize('15pt')" id="btn-s15">15</button>
        <button onclick="setFontSize('16pt')" id="btn-s16">16</button>
        <button onclick="setFontSize('18pt')" id="btn-s18">18</button>
        <button onclick="setFontSize('20pt')" id="btn-s20">20</button>
        <button onclick="setFontSize('22pt')" id="btn-s22">22</button>
        <button onclick="setFontSize('24pt')" id="btn-s24">24</button>
    </div>
    
    <div class="textarea-wrapper">
        <textarea id="text" placeholder="Text hier eingeben oder einfügen..."></textarea>
        <div class="meta" id="charCount">0 Zeichen</div>
    </div>
    
    <div class="actions">
        <button class="btn print-btn" onclick="printPage()">
            <span>🖨️</span> Drucken
        </button>
        <button class="btn reset-btn" onclick="newPage()">
            <span>🗑️</span> Löschen
        </button>
    </div>
</div>

<script>
const textarea = document.getElementById("text");
const charCount = document.getElementById("charCount");
let originalText = "";

function removeEmojis(str){
    try {
        return str.replace(/\p{Emoji_Presentation}|\p{Extended_Pictographic}/gu, '');
    } catch(e) {
        return str.replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|\uD83E[\uDD00-\uDDFF])/g, '');
    }
}

function updateCount(){
    charCount.textContent = textarea.value.length + " Zeichen";
}

function setAlign(align){
    textarea.style.textAlign = align;
    document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + align).classList.add('active');
}

function setFontSize(size){
    textarea.style.fontSize = size;
    document.querySelectorAll('.font-row button, .font-row-2 button').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-s' + size.replace('pt','')).classList.add('active');
}

function printPage(){
    if(textarea.value.trim() === ""){
        alert("Bitte geben Sie Text ein.");
        return;
    }
    window.print();
}

function newPage(){
    if(confirm("Text wirklich löschen?")){
        textarea.value = "";
        updateCount();
        textarea.focus();
    }
}

// Emoji vor dem Drucken entfernen
window.addEventListener('beforeprint', function(){
    originalText = textarea.value;
    textarea.value = removeEmojis(originalText);
});

window.addEventListener('afterprint', function(){
    textarea.value = originalText;
});

textarea.addEventListener('input', updateCount);
</script>

</body>
</html>
